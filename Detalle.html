<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZMHEYCXL32"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ZMHEYCXL32');

<title>Detalle</title>

<style>

body {
    background-color: #DCEAF7;
    font-family: "Pacifico", cursive;
    margin: 0;
    text-align: center;
    color: #7A6F60;
}

.tarjeta {
    background-color: #F5F2E8;
    margin: 40px auto;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

#nombre {
    margin-bottom: 5px;
}

#precio {
    font-family: "Quicksand", sans-serif;
    color: #7A6F60;
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 12px;
}

.tarjeta p {
   font-family: "Quicksand", sans-serif;
   text-align: left;
}

.zoom {
    width: 230px;
    height: 230px;

    overflow: hidden;

    border-radius: 15px;

    margin: auto;

    cursor: zoom-in;
}

#principal {

    width: 100%;
    height: 100%;

    object-fit: cover;

    transition: transform 0.1s ease;
}

.mini {
    margin-top: 10px;
}

.mini img {
    width: 60px;
    margin: 5px;
    cursor: pointer;
    border-radius: 10px;
}

.boton {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #A9C7E8;
    color: white;
    border-radius: 15px;
    font-family: "Quicksand", sans-serif;
    text-decoration: none;
}

.boton:hover {
    background-color: #7A6F60;
}

footer {
    text-align: center;
    padding: 15px;
    color: #7A6F60;
    font-family: 'Quicksand', sans-serif;
}

#estadoProducto {
    display: flex;
    justify-content: center;
    gap: 8kpx;
    margin-top: 10px;
    margin-bottom: 12px;
}

.estado {
    padding: 5px 9px;
    border-radius: 20px;
    color: white;
    font-size: 9px;
    font-weight: bold;
    font-family: "Quicksand", sans-serif;
}

.unicoGrande {
    background-color: #A9C7E8;
}

.vendidoGrande {
    background-color: #7A6F60;
}

.nuevoGrande {
    background-color: #A9C7E8;
}

.proximamenteGrande {
    background-color: #7A6F60;
}

.pedidoGrande {
    background-color: #A9C7E8;
}

#visor {

    display: none;

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.8);

    justify-content: center;
    align-items: center;

    z-index: 9999;
}

#visor img {

    max-width: 90%;
    max-height: 90%;

    border-radius: 15px;
}
</style>
</head>

<body>

<div class="tarjeta">

<h2 id="nombre"></h2>

<h3 id="precio"></h3>

<div id="estadoProducto"></div>

<div id="visor" onclick="cerrarVisor()">
    <img id="imagenGrande">
</div>

<div class="zoom"
     onmousemove="zoom(event)"
     onmouseleave="resetZoom()"
     onclick="abrirVisor()">

    <img id="principal">

</div>

<div class="mini">
    <img id="img1" onclick="cambiar(this)">
    <img id="img2" onclick="cambiar(this)">
</div>

<p id="desc"></p>

<a id="btnPedir" class="boton">Pedir</a>

</div>

<footer>
    © 2026 Made by Annie
</footer>

<script>

const params = new URLSearchParams(window.location.search);

let nombre = params.get("nombre");

let precio = params.get("precio");

let desc = params.get("desc");

let img1 = params.get("img1");

let img2 = params.get("img2");

let unico = params.get("unico");

let vendido = params.get("vendido");

let nuevo = params.get("nuevo");

let pedido = params.get("pedido");

let proximamente = params.get("proximamente");

document.getElementById("nombre").innerText = nombre;

document.getElementById("precio").innerText = precio;

document.getElementById("desc").innerText = desc;

document.getElementById("principal").src = img1;

document.getElementById("img1").src = img1;

document.getElementById("img2").src = img2;

let estado = document.getElementById("estadoProducto");

if (pedido == "si") {

    estado.innerHTML += `
    <span class="estado pedidoGrande">
        PEDIDO PERSONALIZADO
    </span>
    `;
}

if (proximamente == "si") {

    estado.innerHTML += `
    <span class="estado proximamenteGrande">
        PROXIMAMENTE
    </span>
    `;
}

if (nuevo == "si") {

    estado.innerHTML += `
    <span class="estado nuevoGrande">
        NUEVO
    </span>
    `;
}

if (unico == "si") {

    estado.innerHTML += `
    <span class="estado unicoGrande">
        PIEZA UNICA
    </span>
    `;
}

if (vendido == "si") {

    estado.innerHTML += `
    <span class="estado vendidoGrande">
        VENDIDO
    </span>
    `;
}

if (vendido == "si" || proximamente == "si" || pedido == "si") {

    document.getElementById("btnPedir").style.display = "none";

}

function cambiar(img) {

    document.getElementById("principal").src = img.src;
}

document.getElementById("btnPedir").href =

"Pedir.html?producto=" + encodeURIComponent(nombre)

+ "&img=" + encodeURIComponent(img1)

+ "&desc=" + encodeURIComponent(desc);

function zoom(event) {

    let img = document.getElementById("principal");

    let rect = event.currentTarget.getBoundingClientRect();

    let x = ((event.clientX - rect.left) / rect.width) * 100;

    let y = ((event.clientY - rect.top) / rect.height) * 100;

    img.style.transformOrigin = x + "% " + y + "%";

    img.style.transform = "scale(2)";
}

function resetZoom() {

    let img = document.getElementById("principal");

    img.style.transform = "scale(1)";
}

function abrirVisor() {

    if (window.innerWidth <= 768) {

        document.getElementById("imagenGrande").src =
            document.getElementById("principal").src;

        document.getElementById("visor").style.display = "flex";

    }
}

function cerrarVisor() {

    document.getElementById("visor").style.display = "none";

}

</script>

</body>
</html>
